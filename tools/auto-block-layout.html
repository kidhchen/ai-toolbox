<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>超快速积木自动排版工具</title>
  <style>
    :root {
      --bg: #f5f7fc;
      --panel: #ffffff;
      --ink: #12182a;
      --muted: #667085;
      --line: #d8def0;
      --accent: #6f7df4;
      --accent-2: #9b8cff;
      --accent-soft: #ebeefe;
      --stage: #d9c9ff;
      --danger: #f04438;
      --shadow: 0 18px 46px rgba(43, 54, 116, .16);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(111, 125, 244, .16), transparent 32%),
        radial-gradient(circle at 88% 2%, rgba(155, 140, 255, .14), transparent 28%),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 46%, #eef2fb 100%);
      color: var(--ink);
      font: 700 14px/1.45 "Arial Black", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      letter-spacing: 0;
    }

    button, input, select { font: inherit; }
    button {
      height: 34px;
      border: 1px solid rgba(138, 148, 188, .42);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      background: linear-gradient(180deg, #fff 0%, #f4f6ff 100%);
      box-shadow: 0 1px 0 rgba(255,255,255,.8) inset, 0 6px 14px rgba(47, 62, 115, .08);
      cursor: pointer;
      transition: .16s ease;
      white-space: nowrap;
    }
    button:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 1px 0 rgba(255,255,255,.9) inset, 0 10px 20px rgba(80, 92, 180, .16);
    }
    button.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #5968ed 0%, #7b78ff 55%, #a78bfa 100%);
      box-shadow: 0 1px 0 rgba(255,255,255,.24) inset, 0 12px 24px rgba(111, 125, 244, .3);
    }
    button.danger { color: var(--danger); border-color: #ffd1cc; }
    button.icon { width: 34px; padding: 0; }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    input[type="range"] { width: 100%; accent-color: var(--accent); }
    input[type="number"], select {
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 8px;
      background: linear-gradient(180deg, #fff, #f8f9ff);
      color: var(--ink);
    }
    input[type="number"] { width: 72px; }

    .app {
      display: grid;
      grid-template-columns: 360px minmax(720px, 1fr) 320px;
      gap: 14px;
      height: 100vh;
      padding: 14px;
    }
    .panel {
      min-height: 0;
      overflow: hidden;
      border: 1px solid rgba(186, 194, 223, .76);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(250,251,255,.94));
      box-shadow: var(--shadow);
    }
    .left, .right, .workspace { display: flex; flex-direction: column; min-height: 0; }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #f3f5ff 100%);
    }
    .panel-head h1, .panel-head h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
    }
    .section, .control-group {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .control-group h3 { margin: 0 0 10px; font-size: 13px; font-weight: 900; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .muted { color: var(--muted); font-size: 12px; font-weight: 700; }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      width: 100%;
      border-radius: 9px;
      background: linear-gradient(180deg, #e9ecf8, #f6f7ff);
      box-shadow: inset 0 2px 8px rgba(43, 54, 116, .08);
    }
    .segmented button { border: 0; background: transparent; box-shadow: none; }
    .segmented button.active {
      color: var(--accent);
      background: linear-gradient(180deg, #fff, #f6f7ff);
      box-shadow: 0 8px 16px rgba(43, 54, 116, .12);
    }

    .drop {
      position: relative;
      min-height: 96px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px dashed #aab4d6;
      border-radius: 10px;
      color: var(--muted);
      background: linear-gradient(145deg, #fff 0%, #f6f8ff 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 8px 20px rgba(47, 62, 115, .06);
      cursor: pointer;
    }
    .drop strong { display: block; color: var(--ink); font-size: 14px; font-weight: 900; margin-bottom: 4px; }
    .drop.drag { border-color: var(--accent); background: var(--accent-soft); }
    .drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .list { flex: 1; min-height: 0; overflow: auto; padding: 8px; }
    .asset {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: linear-gradient(180deg, #fff, #f8f9ff);
      box-shadow: 0 8px 18px rgba(47, 62, 115, .07);
      cursor: grab;
    }
    .asset.selected { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft), 0 10px 20px rgba(80, 92, 180, .12); }
    .asset.dragging { opacity: .45; }
    .thumb {
      width: 48px;
      height: 48px;
      border: 1px solid #edf0f7;
      border-radius: 7px;
      object-fit: contain;
      background:
        linear-gradient(45deg, #e9edf5 25%, transparent 25%),
        linear-gradient(-45deg, #e9edf5 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e9edf5 75%),
        linear-gradient(-45deg, transparent 75%, #e9edf5 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    }
    .asset-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; font-weight: 900; }
    .asset-meta { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .asset-tools { display: flex; gap: 4px; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(186, 194, 223, .76);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.97), rgba(245,247,255,.96));
      box-shadow: var(--shadow);
    }
    .canvas-shell {
      flex: 1;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: hidden;
      border: 1px solid rgba(186, 194, 223, .76);
      border-radius: 10px;
      background:
        linear-gradient(45deg, #e9edf5 25%, transparent 25%),
        linear-gradient(-45deg, #e9edf5 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e9edf5 75%),
        linear-gradient(-45deg, transparent 75%, #e9edf5 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.78);
    }
    .stage-wrap {
      position: relative;
      width: min(100%, calc((100vh - 120px) * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      user-select: none;
      border: 1px solid #cfd6e8;
      background: rgba(255,255,255,.76);
      box-shadow: 0 20px 60px rgba(43, 54, 116, .2);
    }
    .guide { position: absolute; inset: 0; pointer-events: none; }
    .page-border { position: absolute; inset: 0; border: 5px solid var(--stage); }
    .forbidden {
      position: absolute;
      display: grid;
      place-items: center;
      border: 5px dashed var(--stage);
      border-radius: 20px;
      color: var(--stage);
      font-size: clamp(32px, 7vw, 116px);
      font-weight: 900;
    }
    .divider { position: absolute; top: 0; bottom: 0; width: 5px; background: var(--stage); }
    .item { position: absolute; transform-origin: center center; cursor: move; touch-action: none; }
    .item img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; }
    .item.slot { border: 2px dashed rgba(111, 125, 244, .72); border-radius: 8px; background: rgba(111, 125, 244, .08); }
    .item.slot::after { content: "空白槽位"; position: absolute; inset: 0; display: grid; place-items: center; color: rgba(111, 125, 244, .74); font-weight: 900; font-size: 18px; }
    .item.selected { outline: 2px solid var(--accent); outline-offset: 3px; }
    .handle {
      position: absolute;
      right: -9px;
      bottom: -9px;
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 50%;
      background: linear-gradient(135deg, #5968ed, #9b8cff);
      box-shadow: 0 4px 12px rgba(43, 54, 116, .35);
      cursor: nwse-resize;
    }
    .item.selected .handle { display: block; }

    .field {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr) 58px;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }
    .field label { color: var(--muted); font-size: 12px; font-weight: 900; }

    .two-col-toggle {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(111, 125, 244, .32);
      border-radius: 10px;
      background: linear-gradient(135deg, #f8f9ff 0%, #edf0ff 100%);
      box-shadow: 0 10px 22px rgba(80, 92, 180, .12), inset 0 1px 0 rgba(255,255,255,.9);
      cursor: pointer;
    }
    .two-col-toggle input { display: none; }
    .switch {
      width: 42px;
      height: 24px;
      padding: 3px;
      border-radius: 999px;
      background: linear-gradient(180deg, #c7cedf, #eef1f8);
      box-shadow: inset 0 2px 5px rgba(43, 54, 116, .22);
    }
    .switch::before {
      content: "";
      display: block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 4px 10px rgba(43, 54, 116, .2);
      transition: .18s ease;
    }
    .two-col-toggle input:checked + .switch {
      background: linear-gradient(135deg, #5968ed, #a78bfa);
    }
    .two-col-toggle input:checked + .switch::before { transform: translateX(18px); }
    .toggle-title { font-size: 14px; font-weight: 900; color: var(--ink); }
    .toggle-note { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }

    .notice {
      display: none;
      padding: 10px 12px;
      margin-top: 10px;
      border-radius: 8px;
      color: #067647;
      background: #f0fdf7;
      font-size: 12px;
    }
    .notice.show { display: block; }

    .cropper {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(10, 18, 32, .62);
    }
    .cropper.open { display: flex; }
    .crop-card {
      width: min(980px, 100%);
      max-height: calc(100vh - 48px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      overflow: hidden;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 26px 90px rgba(0,0,0,.36);
    }
    .crop-preview { display: grid; place-items: center; min-height: 540px; overflow: auto; padding: 20px; background: #eef1f8; }
    .crop-stage { position: relative; max-width: 100%; max-height: 74vh; background: #fff; box-shadow: 0 8px 30px rgba(16,24,40,.18); }
    .crop-stage img { display: block; max-width: min(620px, 62vw); max-height: 74vh; object-fit: contain; }
    .crop-box { position: absolute; border: 2px solid var(--accent); border-radius: 16px; box-shadow: 0 0 0 9999px rgba(10,18,32,.42); cursor: move; }
    .crop-box .handle { display: block; right: -10px; bottom: -10px; }
    .crop-side { padding: 16px; border-left: 1px solid var(--line); overflow: auto; }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 320px minmax(560px, 1fr); }
      .right { grid-column: 1 / -1; min-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel left">
      <div class="panel-head">
        <h1>超快速积木自动排版工具</h1>
        <button id="clearAll" class="danger">清空</button>
      </div>
      <div class="section">
        <div class="segmented">
          <button id="modeLandscape" class="active" type="button">横版</button>
          <button id="modePortrait" type="button">竖版</button>
        </div>
      </div>
      <div class="section">
        <div class="drop" id="blocksDrop">
          <input id="blocksInput" type="file" accept="image/png,image/jpeg,image/webp" multiple>
          <div><strong>积木图片</strong><span>拖拽上传或批量选择</span></div>
        </div>
      </div>
      <div class="section">
        <div class="drop" id="cardsDrop">
          <input id="cardsInput" type="file" accept="image/png,image/jpeg,image/webp" multiple>
          <div><strong>角色卡图片</strong><span>批量上传后用同一裁切框处理</span></div>
        </div>
        <div class="row" style="margin-top:10px">
          <button id="openCrop" type="button">批量裁切角色卡</button>
          <button id="addSlot" type="button">插入空白槽位</button>
        </div>
      </div>
      <div class="panel-head">
        <h2>文件管理</h2>
        <span class="muted" id="assetCount">0 项</span>
      </div>
      <div class="list" id="assetList"></div>
    </aside>

    <main class="workspace">
      <div class="toolbar">
        <div class="row">
          <button id="autoLayout" class="primary" type="button">自动排版</button>
          <button id="fitView" type="button">适应视图</button>
          <span class="muted">画布 1920 × 1080，导出透明 PNG</span>
        </div>
        <button id="exportPng" class="primary" type="button">导出 PNG</button>
      </div>
      <div class="canvas-shell">
        <div class="stage-wrap" id="stage">
          <div class="guide">
            <div class="page-border"></div>
            <div class="forbidden" id="forbiddenBox">舞台效果</div>
            <div class="divider" id="divider"></div>
          </div>
          <div id="itemsLayer"></div>
        </div>
      </div>
    </main>

    <aside class="panel right">
      <div class="panel-head"><h2>排版控制</h2></div>
      <div class="control-group">
        <h3>禁排区</h3>
        <div class="field"><label>缩放</label><input id="stageScale" type="range" min="80" max="112" value="100"><input id="stageScaleNum" type="number" min="80" max="112" value="100"></div>
        <div class="field"><label>左右</label><input id="stageX" type="range" min="-180" max="180" value="0"><input id="stageXNum" type="number" min="-180" max="180" value="0"></div>
        <div class="field"><label>上下</label><input id="stageY" type="range" min="-120" max="120" value="0"><input id="stageYNum" type="number" min="-120" max="120" value="0"></div>
        <button id="resetForbidden" type="button">重置禁排区</button>
      </div>
      <div class="control-group">
        <h3>自动排版</h3>
        <div class="field"><label>横向间距</label><input id="gapX" type="range" min="0" max="160" value="60"><input id="gapXNum" type="number" min="0" max="160" value="60"></div>
        <div class="field"><label>纵向间距</label><input id="gapY" type="range" min="0" max="160" value="58"><input id="gapYNum" type="number" min="0" max="160" value="58"></div>
        <div class="field"><label>积木高度</label><input id="blockHeight" type="range" min="80" max="260" value="170"><input id="blockHeightNum" type="number" min="80" max="260" value="170"></div>
        <div class="field"><label>角色卡</label><select id="cardPosition"><option value="top">顶部一排</option><option value="left">左侧一列</option></select><span></span></div>
        <label class="two-col-toggle">
          <input id="allowTwoColumns" type="checkbox">
          <span class="switch"></span>
          <span><span class="toggle-title">双排显示</span><span class="toggle-note">开启后自动适配两列比例，避免出框</span></span>
        </label>
      </div>
      <div class="control-group">
        <h3>选中素材</h3>
        <div class="field"><label>X</label><input id="itemX" type="range" min="0" max="1920" value="0"><input id="itemXNum" type="number" min="0" max="1920" value="0"></div>
        <div class="field"><label>Y</label><input id="itemY" type="range" min="0" max="1080" value="0"><input id="itemYNum" type="number" min="0" max="1080" value="0"></div>
        <div class="field"><label>宽度</label><input id="itemW" type="range" min="20" max="1000" value="200"><input id="itemWNum" type="number" min="20" max="1000" value="200"></div>
        <div class="field"><label>缩放</label><input id="itemScale" type="range" min="35" max="220" value="100"><input id="itemScaleNum" type="number" min="35" max="220" value="100"></div>
        <div class="row">
          <button id="bringUp" type="button">上移层级</button>
          <button id="sendDown" type="button">下移层级</button>
          <button id="deleteItem" class="danger" type="button">删除</button>
        </div>
        <div class="notice" id="toast"></div>
      </div>
    </aside>
  </div>

  <div class="cropper" id="cropper">
    <div class="crop-card">
      <div class="crop-preview">
        <div class="crop-stage" id="cropStage">
          <img id="cropImage" alt="">
          <div class="crop-box" id="cropBox"><div class="handle"></div></div>
        </div>
      </div>
      <div class="crop-side">
        <h2 style="margin:0 0 6px;font-size:16px">角色卡批量裁切</h2>
        <p class="muted" style="margin:0 0 12px">拖动裁切框，或调整滑块。确认后同一比例会应用到所有角色卡。</p>
        <div class="field"><label>左</label><input id="cropX" type="range" min="0" max="100" value="3"><input id="cropXNum" type="number" min="0" max="100" value="3"></div>
        <div class="field"><label>上</label><input id="cropY" type="range" min="0" max="100" value="3"><input id="cropYNum" type="number" min="0" max="100" value="3"></div>
        <div class="field"><label>尺寸</label><input id="cropS" type="range" min="10" max="100" value="94"><input id="cropSNum" type="number" min="10" max="100" value="94"></div>
        <div class="row" style="margin-top:14px">
          <button id="applyCrop" class="primary" type="button">应用到全部</button>
          <button id="closeCrop" type="button">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const W = 1920, H = 1080;
    const state = {
      mode: 'landscape',
      forbidden: { scale: 100, x: 0, y: 0 },
      gapX: 60,
      gapY: 58,
      blockHeight: 170,
      cardPosition: 'top',
      allowTwoColumns: false,
      items: [],
      selectedId: null,
      crop: { x: 3, y: 3, s: 94 }
    };
    const defaults = {
      landscape: { x: 12, y: 198, w: 1105, h: 685, divider: 1125 },
      portrait: { x: 210, y: 8, w: 668, h: 1062, divider: 880 }
    };
    const $ = id => document.getElementById(id);
    const stage = $('stage'), itemsLayer = $('itemsLayer'), assetList = $('assetList'), forbiddenBox = $('forbiddenBox'), divider = $('divider'), toast = $('toast');
    const controls = [
      ['stageScale','stageScaleNum',() => state.forbidden.scale, v => { state.forbidden.scale = +v; renderGuide(); }],
      ['stageX','stageXNum',() => state.forbidden.x, v => { state.forbidden.x = +v; renderGuide(); }],
      ['stageY','stageYNum',() => state.forbidden.y, v => { state.forbidden.y = +v; renderGuide(); }],
      ['gapX','gapXNum',() => state.gapX, v => { state.gapX = +v; }],
      ['gapY','gapYNum',() => state.gapY, v => { state.gapY = +v; }],
      ['blockHeight','blockHeightNum',() => state.blockHeight, v => { state.blockHeight = +v; }],
      ['itemX','itemXNum',() => selected()?.x ?? 0, v => updateSelected({ x: +v })],
      ['itemY','itemYNum',() => selected()?.y ?? 0, v => updateSelected({ y: +v })],
      ['itemW','itemWNum',() => selected()?.w ?? 200, v => {
        const item = selected(); if (!item) return;
        const nw = +v, nh = nw / item.aspect;
        updateSelected({ w: nw, h: nh, scale: nh / itemBaseHeight(item) * 100 });
      }],
      ['itemScale','itemScaleNum',() => selected()?.scale ?? 100, v => {
        const item = selected(); if (!item) return;
        const h = itemBaseHeight(item) * (+v / 100);
        updateSelected({ scale: +v, h, w: h * item.aspect });
      }],
      ['cropX','cropXNum',() => state.crop.x, v => { state.crop.x = +v; renderCropBox(); }],
      ['cropY','cropYNum',() => state.crop.y, v => { state.crop.y = +v; renderCropBox(); }],
      ['cropS','cropSNum',() => state.crop.s, v => { state.crop.s = +v; renderCropBox(); }]
    ];

    function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
    function stageScale() { return stage.clientWidth / W; }
    function cssPx(n) { return `${n * stageScale()}px`; }
    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
    function selected() { return state.items.find(item => item.id === state.selectedId); }
    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast.t);
      showToast.t = setTimeout(() => toast.classList.remove('show'), 2200);
    }
    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function addFiles(files, type) {
      for (const file of Array.from(files).filter(file => file.type.startsWith('image/'))) {
        const src = await fileToDataURL(file);
        const img = await loadImage(src);
        const aspect = img.naturalWidth / img.naturalHeight;
        const scale = type === 'block' ? detectDefaultBlockScale(img) : 100;
        const baseH = type === 'card' ? 180 : state.blockHeight;
        const h = baseH * scale / 100;
        state.items.push({
          id: uid(), type, name: file.name, src, originalSrc: src,
          naturalW: img.naturalWidth, naturalH: img.naturalHeight, aspect, scale,
          x: 1180, y: 120 + state.items.length * 28, w: h * aspect, h, z: state.items.length + 1
        });
      }
      state.selectedId = state.items.at(-1)?.id ?? state.selectedId;
      renderAll();
      if (type === 'card') showToast('角色卡已加入，可打开批量裁切。');
    }

    function detectDefaultBlockScale(img) {
      const aspect = img.naturalWidth / img.naturalHeight;
      if (aspect < 1.75 || aspect > 2.45) return 100;
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(img, 0, 0);
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      const cols = Math.max(2, Math.min(8, Math.round(canvas.width * .018)));
      const rows = new Set();
      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < cols; x++) {
          if (data[(y * canvas.width + x) * 4 + 3] > 24) { rows.add(y); break; }
        }
      }
      if (!rows.size) return 100;
      const values = [...rows], minY = Math.min(...values), maxY = Math.max(...values);
      const coverage = rows.size / canvas.height;
      return coverage < .82 && minY > canvas.height * .06 && maxY < canvas.height * .94 ? 120 : 100;
    }

    function addSlot() {
      const h = state.blockHeight, aspect = 3.05;
      state.items.push({ id: uid(), type: 'slot', name: '空白槽位', src: '', originalSrc: '', naturalW: h * aspect, naturalH: h, aspect, scale: 100, x: 1180, y: 140, w: h * aspect, h, z: state.items.length + 1 });
      state.selectedId = state.items.at(-1).id;
      renderAll();
    }

    function setMode(mode) {
      state.mode = mode;
      $('modeLandscape').classList.toggle('active', mode === 'landscape');
      $('modePortrait').classList.toggle('active', mode === 'portrait');
      state.forbidden = { scale: 100, x: 0, y: 0 };
      renderGuide();
    }
    function forbiddenRect() {
      const base = defaults[state.mode];
      let s = state.forbidden.scale / 100;
      let w = base.w * s, h = base.h * s;
      let x = base.x + state.forbidden.x - (w - base.w) / 2;
      let y = base.y + state.forbidden.y - (h - base.h) / 2;
      if (state.mode === 'portrait') {
        h = H - 16; w = h * (base.w / base.h); y = 8;
        x = base.x + state.forbidden.x - (w - base.w) / 2;
      }
      x = clamp(x, 0, W - w); y = clamp(y, 0, H - h);
      return { x, y, w, h };
    }
    function allowedRect() {
      const f = forbiddenRect(), margin = 34;
      const x = clamp(f.x + f.w + 42, 0, W - margin);
      return { x, y: margin, w: W - x - margin, h: H - margin * 2 };
    }
    function renderGuide() {
      const f = forbiddenRect();
      forbiddenBox.style.left = cssPx(f.x);
      forbiddenBox.style.top = cssPx(f.y);
      forbiddenBox.style.width = cssPx(f.w);
      forbiddenBox.style.height = cssPx(f.h);
      divider.style.left = cssPx(state.mode === 'landscape' ? defaults.landscape.divider + state.forbidden.x : f.x + f.w + 8);
      syncControls();
    }

    function renderItems() {
      itemsLayer.innerHTML = '';
      const scale = stageScale();
      [...state.items].sort((a,b) => a.z - b.z).forEach(item => {
        const el = document.createElement('div');
        el.className = `item ${item.type === 'slot' ? 'slot' : ''} ${item.id === state.selectedId ? 'selected' : ''}`;
        el.dataset.id = item.id;
        el.style.left = `${item.x * scale}px`;
        el.style.top = `${item.y * scale}px`;
        el.style.width = `${item.w * scale}px`;
        el.style.height = `${item.h * scale}px`;
        el.style.zIndex = item.z;
        if (item.src) {
          const img = document.createElement('img');
          img.src = item.src; img.alt = item.name;
          el.appendChild(img);
        }
        const handle = document.createElement('div');
        handle.className = 'handle';
        el.appendChild(handle);
        el.addEventListener('pointerdown', startItemDrag);
        handle.addEventListener('pointerdown', startResize);
        itemsLayer.appendChild(el);
      });
      syncControls();
    }
    function renderList() {
      assetList.innerHTML = '';
      state.items.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = `asset ${item.id === state.selectedId ? 'selected' : ''}`;
        row.draggable = true;
        row.dataset.id = item.id;
        row.innerHTML = `${item.src ? `<img class="thumb" src="${item.src}" alt="">` : `<div class="thumb"></div>`}
          <div><div class="asset-name">${item.name}</div><div class="asset-meta">${item.type === 'block' ? '积木' : item.type === 'card' ? '角色卡' : '空白槽位'} · ${Math.round(item.w)}×${Math.round(item.h)}</div></div>
          <div class="asset-tools"><button class="icon" data-act="up" title="上移">↑</button><button class="icon" data-act="down" title="下移">↓</button></div>`;
        row.addEventListener('click', e => {
          const act = e.target.dataset.act;
          if (act) { moveOrder(item.id, act === 'up' ? -1 : 1); return; }
          state.selectedId = item.id; renderAll();
        });
        row.addEventListener('dragstart', () => row.classList.add('dragging'));
        row.addEventListener('dragend', () => row.classList.remove('dragging'));
        row.addEventListener('dragover', e => {
          e.preventDefault();
          const from = state.items.findIndex(x => x.id === document.querySelector('.asset.dragging')?.dataset.id);
          if (from < 0 || from === index) return;
          const [moved] = state.items.splice(from, 1);
          state.items.splice(index, 0, moved);
          normalizeZ(); renderAll();
        });
        assetList.appendChild(row);
      });
      $('assetCount').textContent = `${state.items.length} 项`;
    }
    function renderAll() { normalizeZ(); renderGuide(); renderItems(); renderList(); }
    function normalizeZ() { state.items.forEach((item, i) => item.z = i + 1); }
    function moveOrder(id, delta) {
      const i = state.items.findIndex(item => item.id === id), j = clamp(i + delta, 0, state.items.length - 1);
      if (i === j) return;
      const [item] = state.items.splice(i, 1);
      state.items.splice(j, 0, item);
      renderAll();
    }

    function startItemDrag(e) {
      if (e.target.classList.contains('handle')) return;
      const el = e.currentTarget, item = state.items.find(x => x.id === el.dataset.id);
      state.selectedId = item.id;
      const scale = stageScale(), startX = e.clientX, startY = e.clientY, ox = item.x, oy = item.y;
      el.setPointerCapture(e.pointerId);
      renderItems();
      const move = ev => { item.x = clamp(ox + (ev.clientX - startX) / scale, 0, W - item.w); item.y = clamp(oy + (ev.clientY - startY) / scale, 0, H - item.h); renderItems(); };
      const up = () => { el.removeEventListener('pointermove', move); el.removeEventListener('pointerup', up); };
      el.addEventListener('pointermove', move); el.addEventListener('pointerup', up);
    }
    function startResize(e) {
      e.stopPropagation();
      const el = e.currentTarget.parentElement, item = state.items.find(x => x.id === el.dataset.id);
      state.selectedId = item.id;
      const scale = stageScale(), startX = e.clientX, ow = item.w;
      el.setPointerCapture(e.pointerId);
      const move = ev => { const nw = clamp(ow + (ev.clientX - startX) / scale, 20, 1100); item.w = nw; item.h = nw / item.aspect; item.scale = item.h / itemBaseHeight(item) * 100; renderItems(); };
      const up = () => { el.removeEventListener('pointermove', move); el.removeEventListener('pointerup', up); };
      el.addEventListener('pointermove', move); el.addEventListener('pointerup', up);
    }
    function updateSelected(patch) {
      const item = selected(); if (!item) return;
      Object.assign(item, patch);
      item.x = clamp(item.x, 0, W - item.w);
      item.y = clamp(item.y, 0, H - item.h);
      renderItems(); renderList();
    }
    function syncControls() {
      controls.forEach(([a,b,get]) => {
        const value = Math.round(get());
        if ($(a) && document.activeElement !== $(a)) $(a).value = value;
        if ($(b) && document.activeElement !== $(b)) $(b).value = value;
      });
      const has = !!selected();
      ['itemX','itemXNum','itemY','itemYNum','itemW','itemWNum','itemScale','itemScaleNum','bringUp','sendDown','deleteItem'].forEach(id => $(id).disabled = !has);
      $('cardPosition').value = state.cardPosition;
      $('allowTwoColumns').checked = state.allowTwoColumns;
    }

    function autoLayout() {
      const area = allowedRect();
      const cards = state.items.filter(item => item.type === 'card');
      const blocks = state.items.filter(item => item.type === 'block' || item.type === 'slot');
      const ordered = [...cards, ...blocks];
      if (!ordered.length) return;
      const cardSize = clamp(state.mode === 'portrait' ? 155 : 180, 120, 220);
      cards.forEach(card => { card.w = cardSize * card.aspect; card.h = cardSize; });
      blocks.forEach(block => { const h = state.blockHeight * ((block.scale ?? 100) / 100); block.h = h; block.w = h * block.aspect; });

      if (state.cardPosition === 'left' && cards.length) {
        const colW = Math.max(...cards.map(c => c.w), 0);
        const cardGap = Math.min(state.gapY, 36);
        const totalCardsH = cards.reduce((s,c) => s + c.h, 0) + Math.max(0, cards.length - 1) * cardGap;
        let y = area.y + Math.max(0, (area.h - totalCardsH) / 2);
        cards.forEach(card => { card.x = area.x; card.y = y; y += card.h + cardGap; });
        placeBlocks(blocks, area.x + colW + state.gapX, area.y, area.w - colW - state.gapX, area.h);
      } else {
        let cardY = area.y, rowH = 0;
        if (cards.length) {
          const totalW = cards.reduce((s,c) => s + c.w, 0) + Math.max(0, cards.length - 1) * state.gapX;
          let x = area.x + Math.max(0, (area.w - totalW) / 2);
          cards.forEach(card => {
            if (x + card.w > area.x + area.w) { x = area.x; cardY += rowH + state.gapY; rowH = 0; }
            card.x = x; card.y = cardY; x += card.w + state.gapX; rowH = Math.max(rowH, card.h);
          });
        }
        const startY = cards.length ? cardY + rowH + state.gapY : area.y;
        placeBlocks(blocks, area.x, startY, area.w, area.y + area.h - startY);
      }
      state.selectedId = ordered[0]?.id ?? null;
      renderAll();
    }
    function itemBaseHeight(item) {
      if (!item) return state.blockHeight;
      if (item.type === 'card') return state.mode === 'portrait' ? 155 : 180;
      return state.blockHeight;
    }
    function placeBlocks(items, x0, y0, width, height) {
      if (!items.length) return;
      const minGap = 10;
      if (state.allowTwoColumns && items.length > 1) { placeTwoColumns(items, x0, y0, width, height, minGap); return; }
      const fit = columnFit(items, height, state.gapY, minGap);
      applyScale(items, fit.scale);
      const maxW = Math.max(...items.map(item => item.w), 0);
      if (maxW > width) applyScale(items, width / maxW);
      placeSingleColumn(items, x0, y0, width, height, fit.gap);
    }
    function columnFit(items, height, preferredGap, minGap) {
      const totalH = items.reduce((s,i) => s + i.h, 0), gaps = Math.max(0, items.length - 1);
      if (totalH + gaps * preferredGap <= height) return { gap: preferredGap, scale: 1 };
      if (totalH + gaps * minGap <= height) return { gap: gaps ? (height - totalH) / gaps : 0, scale: 1 };
      return { gap: minGap, scale: clamp((height - gaps * minGap) / totalH, .25, 1) };
    }
    function applyScale(items, scale) { items.forEach(item => { item.w *= scale; item.h *= scale; }); }
    function placeSingleColumn(items, x0, y0, width, height, gap) {
      const colW = Math.max(...items.map(i => i.w));
      const totalH = columnHeight(items, gap);
      const x = x0 + Math.max(0, (width - colW) / 2);
      let y = y0 + Math.max(0, (height - totalH) / 2);
      items.forEach(item => { item.x = x; item.y = y; y += item.h + gap; });
    }
    function placeTwoColumns(items, x0, y0, width, height, minGap) {
      const left = [], right = [];
      items.forEach((item, i) => (i % 2 === 0 ? left : right).push(item));
      const leftFit = columnFit(left, height, state.gapY, minGap);
      const rightFit = columnFit(right, height, state.gapY, minGap);
      const leftW0 = Math.max(...left.map(i => i.w), 0), rightW0 = Math.max(...right.map(i => i.w), 0);
      const minGapX = 20;
      const widthScale = leftW0 + rightW0 > 0 ? (width - minGapX) / (leftW0 + rightW0) : 1;
      applyScale(items, clamp(Math.min(leftFit.scale, rightFit.scale, widthScale, 1), .25, 1));
      const leftW = Math.max(...left.map(i => i.w), 0), rightW = Math.max(...right.map(i => i.w), 0);
      if (width - leftW - rightW < minGapX) applyScale(items, width / (leftW + rightW + minGapX));
      const gapLeft = columnFit(left, height, state.gapY, minGap).gap;
      const gapRight = columnFit(right, height, state.gapY, minGap).gap;
      const finalLeftW = Math.max(...left.map(i => i.w), 0), finalRightW = Math.max(...right.map(i => i.w), 0);
      const gapX = clamp(Math.min(state.gapX, width - finalLeftW - finalRightW), 0, state.gapX);
      const totalW = finalLeftW + finalRightW + gapX;
      const startX = x0 + Math.max(0, (width - totalW) / 2);
      const startY = y0 + Math.max(0, (height - Math.max(columnHeight(left, gapLeft), columnHeight(right, gapRight))) / 2);
      placeColumnAt(left, startX, startY, gapLeft);
      placeColumnAt(right, startX + finalLeftW + gapX, startY, gapRight);
    }
    function columnHeight(items, gap) { return items.reduce((s,i) => s + i.h, 0) + Math.max(0, items.length - 1) * gap; }
    function placeColumnAt(items, x, y, gap) { items.forEach(item => { item.x = x; item.y = y; y += item.h + gap; }); }

    function openCropper() {
      const first = state.items.find(item => item.type === 'card');
      if (!first) { showToast('请先上传角色卡。'); return; }
      $('cropImage').src = first.originalSrc || first.src;
      $('cropper').classList.add('open');
      $('cropImage').onload = () => { state.crop = { x: 3, y: 3, s: 94 }; syncControls(); renderCropBox(); };
    }
    function renderCropBox() {
      const img = $('cropImage'), box = $('cropBox');
      const rect = img.getBoundingClientRect(), stageRect = $('cropStage').getBoundingClientRect();
      const size = Math.min(rect.width, rect.height) * state.crop.s / 100;
      const x = (rect.width - size) * state.crop.x / 100;
      const y = (rect.height - size) * state.crop.y / 100;
      box.style.left = `${rect.left - stageRect.left + x}px`;
      box.style.top = `${rect.top - stageRect.top + y}px`;
      box.style.width = `${size}px`;
      box.style.height = `${size}px`;
      syncControls();
    }
    async function applyCrop() {
      const cards = state.items.filter(item => item.type === 'card');
      for (const card of cards) {
        const img = await loadImage(card.originalSrc || card.src);
        const size = Math.min(img.naturalWidth, img.naturalHeight) * state.crop.s / 100;
        const sx = (img.naturalWidth - size) * state.crop.x / 100;
        const sy = (img.naturalHeight - size) * state.crop.y / 100;
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(size); canvas.height = Math.round(size);
        const ctx = canvas.getContext('2d');
        roundedRectPath(ctx, 0, 0, canvas.width, canvas.height, canvas.width * .1);
        ctx.clip();
        ctx.drawImage(img, sx, sy, size, size, 0, 0, canvas.width, canvas.height);
        card.src = canvas.toDataURL('image/png');
        card.aspect = 1; card.w = card.h;
      }
      $('cropper').classList.remove('open'); renderAll(); showToast('角色卡已批量裁切。');
    }
    function roundedRectPath(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
    }
    function setupCropDrag() {
      const box = $('cropBox');
      box.addEventListener('pointerdown', e => {
        if (e.target.classList.contains('handle')) return;
        e.preventDefault();
        const startX = e.clientX, startY = e.clientY, ox = state.crop.x, oy = state.crop.y;
        box.setPointerCapture(e.pointerId);
        const move = ev => {
          const img = $('cropImage').getBoundingClientRect(), size = Math.min(img.width, img.height) * state.crop.s / 100;
          state.crop.x = clamp(ox + (ev.clientX - startX) / Math.max(1, img.width - size) * 100, 0, 100);
          state.crop.y = clamp(oy + (ev.clientY - startY) / Math.max(1, img.height - size) * 100, 0, 100);
          renderCropBox();
        };
        const up = () => { box.removeEventListener('pointermove', move); box.removeEventListener('pointerup', up); };
        box.addEventListener('pointermove', move); box.addEventListener('pointerup', up);
      });
      box.querySelector('.handle').addEventListener('pointerdown', e => {
        e.stopPropagation();
        const startX = e.clientX, os = state.crop.s;
        box.setPointerCapture(e.pointerId);
        const move = ev => { const img = $('cropImage').getBoundingClientRect(); state.crop.s = clamp(os + (ev.clientX - startX) / Math.min(img.width, img.height) * 100, 10, 100); renderCropBox(); };
        const up = () => { box.removeEventListener('pointermove', move); box.removeEventListener('pointerup', up); };
        box.addEventListener('pointermove', move); box.addEventListener('pointerup', up);
      });
    }
    async function exportPng() {
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, W, H);
      for (const item of [...state.items].sort((a,b) => a.z - b.z)) {
        if (item.type === 'slot' || !item.src) continue;
        const img = await loadImage(item.src);
        ctx.drawImage(img, item.x, item.y, item.w, item.h);
      }
      const d = new Date(), pad = n => String(n).padStart(2, '0');
      const a = document.createElement('a');
      a.download = `tup-${state.mode === 'landscape' ? '横版' : '竖版'}-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
    function bindDrop(dropId, inputId, type) {
      const drop = $(dropId), input = $(inputId);
      input.addEventListener('change', () => addFiles(input.files, type));
      ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
      ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
      drop.addEventListener('drop', e => addFiles(e.dataTransfer.files, type));
    }

    controls.forEach(([a,b,get,set]) => [$(a), $(b)].forEach(el => {
      if (!el) return;
      el.addEventListener('input', () => set(el.value));
      el.addEventListener('change', () => set(el.value));
    }));
    $('modeLandscape').addEventListener('click', () => setMode('landscape'));
    $('modePortrait').addEventListener('click', () => setMode('portrait'));
    $('resetForbidden').addEventListener('click', () => { state.forbidden = { scale: 100, x: 0, y: 0 }; renderGuide(); });
    $('autoLayout').addEventListener('click', autoLayout);
    $('exportPng').addEventListener('click', exportPng);
    $('addSlot').addEventListener('click', addSlot);
    $('openCrop').addEventListener('click', openCropper);
    $('closeCrop').addEventListener('click', () => $('cropper').classList.remove('open'));
    $('applyCrop').addEventListener('click', applyCrop);
    $('cardPosition').addEventListener('change', e => state.cardPosition = e.target.value);
    $('allowTwoColumns').addEventListener('change', e => state.allowTwoColumns = e.target.checked);
    $('deleteItem').addEventListener('click', () => { state.items = state.items.filter(item => item.id !== state.selectedId); state.selectedId = state.items[0]?.id ?? null; renderAll(); });
    $('bringUp').addEventListener('click', () => moveOrder(state.selectedId, 1));
    $('sendDown').addEventListener('click', () => moveOrder(state.selectedId, -1));
    $('clearAll').addEventListener('click', () => { state.items = []; state.selectedId = null; renderAll(); });
    $('fitView').addEventListener('click', () => renderAll());
    window.addEventListener('resize', renderAll);
    bindDrop('blocksDrop', 'blocksInput', 'block');
    bindDrop('cardsDrop', 'cardsInput', 'card');
    setupCropDrag();
    renderAll();
  </script>
</body>
</html>
